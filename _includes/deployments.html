---
layout: default
title: Deployments
---

<h1>AUV Deployment Map</h1>

<div id="map"></div>

<script>
  const map = L.map('map').setView([-30, 135], 4);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  const deployments = [
    {% for d in site.data.sitetext.deployments %}
    {
      name: "{{ d.name }}",
      lat: {{ d.lat }},
      lon: {{ d.lon }},
      summary: "{{ d.summary }}",
      image: "{{ d.image }}",
      link: "/deployments/{{ d.id }}.html"
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  deployments.forEach(d => {
    const marker = L.marker([d.lat, d.lon]).addTo(map);

    marker.bindPopup(`
      <div style="max-width:220px">
        <img src="${d.image}" style="width:100%; border-radius:6px; margin-bottom:5px;">
        <strong>${d.name}</strong><br>
        ${d.summary}<br>
        <a href="${d.link}">View Details →</a>
      </div>
    `);
  });
</script>
