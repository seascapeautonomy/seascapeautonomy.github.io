<!---
layout: default
title: Deployments
--->
{% if site.locale and site.locale != "" and site.locale != nil %}
<section class="bg-light page-section" id="{{ site.data.sitetext.deployments.section | default: "fieldwork" }}">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2 class="section-heading text-uppercase">{{ site.data.sitetext[site.locale].deployments.title | markdownify | default: "AUV Deployments" }}</h2>
        <h3 class="section-subheading text-muted">{{ site.data.sitetext[site.locale].deployments.text | markdownify }}</h3>
      </div>
    </div>
    <div class="row">

<!-- Leaflet CSS -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>
  #map {
    width: 100%;
    height: 600px;
    border-radius: 12px;
  }
</style>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  const map = L.map('map').setView([-30, 135], 4);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  const deployments = [
    {% for d in site.data.sitetext.deployments %}
    {
      name: "{{ d.name }}",
      lat: {{ d.lat }},
      lon: {{ d.lon }},
      summary: "{{ d.summary }}",
      image: "{{ d.image }}",
      link: "/deployments/{{ d.id }}.html"
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  deployments.forEach(d => {
    const marker = L.marker([d.lat, d.lon]).addTo(map);

    marker.bindPopup(`
      <div style="max-width:220px">
        <img src="${d.image}" style="width:100%; border-radius:6px; margin-bottom:5px;">
        <strong>${d.name}</strong><br>
        ${d.summary}<br>
        <a href="${d.link}">View Details →</a>
      </div>
    `);
  });
</script>
{% endif %}
