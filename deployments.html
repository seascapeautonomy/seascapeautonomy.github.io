layout: default
title: Deployments
---

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Deployments</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>

<body>

<h1>Global AUV Deployments</h1>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  const map = L.map('map').setView([-30, 140], 4);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  const deployments = [
    {% for site in site.data.sitetext.deployments %}
    {
      name: "{{ site.name }}",
      lat: {{ site.lat }},
      lon: {{ site.lon }},
      summary: "{{ site.summary }}",
      link: "{{ site.link }}",
      image: "{{ site.image }}"
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  deployments.forEach(site => {
    const marker = L.marker([site.lat, site.lon]).addTo(map);

    marker.bindPopup(`
      <div style="max-width:200px">
        <img src="${site.image}" style="width:100%; border-radius:4px;">
        <b>${site.name}</b><br>
        ${site.summary}<br>
        <a href="${site.link}">View Details →</a>
      </div>
    `);
  });
</script>

</body>
</html>
